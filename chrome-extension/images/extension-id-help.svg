<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <rect width="760" height="360" fill="#f1f3f4"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="760" height="56" fill="#ffffff"/>
  <text x="24" y="35" font-size="20" fill="#202124" font-weight="600">Extensions</text>

  <!-- Developer mode toggle -->
  <text x="560" y="30" font-size="13" fill="#5f6368">Developer mode</text>
  <rect x="672" y="20" width="40" height="18" rx="9" fill="#1a73e8"/>
  <circle cx="703" cy="29" r="7" fill="#ffffff"/>
  <text x="560" y="46" font-size="11" fill="#d93025" font-weight="600">↑ must be ON to see the ID</text>

  <!-- Extension card -->
  <rect x="40" y="88" width="680" height="228" rx="8" fill="#ffffff" stroke="#dadce0"/>

  <!-- Icon -->
  <rect x="64" y="112" width="48" height="48" rx="8" fill="#1a73e8"/>
  <text x="88" y="145" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="700">H</text>

  <!-- Name + version -->
  <text x="128" y="126" font-size="17" fill="#202124" font-weight="600">HyperFetch</text>
  <text x="128" y="148" font-size="13" fill="#5f6368">Accelerate large file downloads (&gt;100MB) using parallel threads</text>

  <!-- ID label + value (highlighted) -->
  <text x="128" y="182" font-size="12" fill="#5f6368">ID</text>
  <rect x="128" y="190" width="330" height="26" rx="4" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="140" y="208" font-size="14" fill="#202124" font-family="Consolas, Menlo, monospace">ekhohmoicafiheojabajlkkfibppajic</text>

  <!-- Callout arrow + note -->
  <path d="M470 203 L520 203" stroke="#d93025" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="528" y="200" font-size="13" fill="#d93025" font-weight="600">This is your</text>
  <text x="528" y="216" font-size="13" fill="#d93025" font-weight="600">YOUR_EXTENSION_ID</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#d93025"/>
    </marker>
  </defs>

  <!-- Bottom controls -->
  <text x="64" y="292" font-size="13" fill="#1a73e8">Details</text>
  <text x="140" y="292" font-size="13" fill="#1a73e8">Remove</text>
  <rect x="636" y="278" width="60" height="22" rx="11" fill="#1a73e8"/>
  <circle cx="682" cy="289" r="8" fill="#ffffff"/>
  <text x="648" y="294" font-size="11" fill="#ffffff">On</text>
</svg>
